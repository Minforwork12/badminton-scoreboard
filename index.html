<<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <!-- บรรทัดนี้สำคัญมาก! ทำให้พอดีกับจอมือถือ/iPad และห้ามซูม (ให้ฟีลเหมือนแอปจริง) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scoreboard App</title>
    <style>
        /* --- CSS: จัดตกแต่งหน้าตาสกอร์บอร์ด --- */
        body {
            font-family: 'Arial Narrow', Arial, sans-serif;
            background-color: #111;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .scoreboard {
            display: flex;
            flex-direction: column;
            background-color: #fff;
            width: 100%; /* ขยายเต็มความกว้างหน้าจอ */
            max-width: 1000px; /* แต่ไม่เกิน 1000px เผื่อเปิดบนคอม */
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.8);
            overflow: hidden;
            border: 2px solid #ccc;
        }

        .row {
            display: flex;
            height: 100px; /* เพิ่มความสูงให้ใหญ่สะใจ */
            border-bottom: 4px solid #ce121e; /* เส้นแบ่งสีแดง */
        }
        .row:last-child { border-bottom: none; }

        /* กล่องย่อประเทศ (สีแดงขอบเฉียง) */
        .country-box {
            width: 15%;
            min-width: 100px;
            background-color: #ce121e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: bold;
            clip-path: polygon(0 0, 75% 0, 100% 100%, 0 100%);
        }

        /* กล่องชื่อนักกีฬา */
        .name-box {
            flex-grow: 1;
            display: flex;
            align-items: center;
            padding-left: 20px;
            font-size: 45px; /* ชื่อใหญ่ขึ้นมาก */
            font-weight: bold;
            color: #111;
            text-transform: uppercase;
        }

        .serve-indicator {
            width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
        }
        .is-serving .serve-indicator { visibility: visible; }

        /* พื้นที่เก็บคะแนนเซ็ตที่ผ่านมา */
        .past-sets-container {
            display: flex;
        }

        .past-score {
            width: 60px;
            background-color: #f7e1e4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: #111;
            border-left: 2px solid #fff;
        }

        /* กล่องคะแนนปัจจุบัน (สีแดง) */
        .current-score {
            width: 15%;
            min-width: 100px;
            background-color: #ce121e;
            color: white;
            font-weight: bold;
            font-size: 65px; /* ตัวเลขคะแนนใหญ่สะใจ */
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 2px solid #fff;
        }

        /* --- CSS: ส่วนของกรรมการ --- */
        .controls {
            margin-top: 30px;
            padding: 20px;
            background: #222;
            color: white;
            border-radius: 8px;
            width: 100%;
            max-width: 1000px;
            box-sizing: border-box;
        }
        .control-row {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap; /* ให้ปุ่มตัดขึ้นบรรทัดใหม่ได้ถ้าจอมือถือเล็ก */
            align-items: center;
            gap: 10px;
        }
        input, select {
            padding: 10px;
            font-size: 18px;
            border-radius: 4px;
            border: 1px solid #555;
        }
        .btn-score {
            background-color: #ce121e;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 24px;
            width: 50px;
            height: 50px;
            cursor: pointer;
        }
        .btn-action {
            background-color: #3b5998;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
        .btn-action:active, .btn-score:active { transform: scale(0.95); }
        .btn-reset { background-color: #666; }
    </style>
</head>
<body>

    <!-- ส่วนที่ 1: หน้าจอสกอร์บอร์ด (จะใหญ่มากเวลามองแนวนอน) -->
    <div class="scoreboard">
        <div class="row" id="player1-row">
            <div class="country-box" id="p1-code-disp">THA</div>
            <div class="name-box" id="p1-name-disp"></div>
            <div class="serve-indicator">
                <svg width="25" height="25" viewBox="0 0 20 20" style="transform: rotate(45deg);">
                    <polygon fill="#ce121e" points="4,4 16,4 12,14 8,14"/>
                    <circle fill="#ce121e" cx="10" cy="16" r="3"/>
                </svg>
            </div>
            <div class="past-sets-container" id="p1-past-sets"></div>
            <div class="current-score" id="p1-curr-disp">0</div>
        </div>

        <div class="row" id="player2-row">
            <div class="country-box" id="p2-code-disp">CHN</div>
            <div class="name-box" id="p2-name-disp"></div>
            <div class="serve-indicator">
                <svg width="25" height="25" viewBox="0 0 20 20" style="transform: rotate(45deg);">
                    <polygon fill="#ce121e" points="4,4 16,4 12,14 8,14"/>
                    <circle fill="#ce121e" cx="10" cy="16" r="3"/>
                </svg>
            </div>
            <div class="past-sets-container" id="p2-past-sets"></div>
            <div class="current-score" id="p2-curr-disp">0</div>
        </div>
    </div>

    <!-- ส่วนที่ 2: ปุ่มกดของกรรมการ -->
    <div class="controls">
        <div class="control-row">
            <strong>ผู้เล่นบน:</strong>
            <input type="text" id="input-p1-name" placeholder="ชื่อนักกีฬา" oninput="updateUI()" style="width: 150px;">
            <select id="input-p1-code" onchange="updateUI()">
                <option value="THA" selected>THA</option>
                <option value="CHN">CHN</option>
                <option value="MAS">MAS</option>
                <option value="JPN">JPN</option>
                <option value="KOR">KOR</option>
                <option value="INA">INA</option>
                <option value="TPE">TPE</option>
                <option value="IND">IND</option>
                <option value="DEN">DEN</option>
            </select>
            <button class="btn-score" onclick="changeScore(1, -1)">-</button>
            <button class="btn-score" onclick="changeScore(1, 1)">+</button>
            <button class="btn-action" onclick="setServing(1)">ให้เสิร์ฟ 🏸</button>
        </div>

        <div class="control-row">
            <strong>ผู้เล่นล่าง:</strong>
            <input type="text" id="input-p2-name" placeholder="ชื่อนักกีฬา" oninput="updateUI()" style="width: 150px;">
            <select id="input-p2-code" onchange="updateUI()">
                <option value="THA">THA</option>
                <option value="CHN" selected>CHN</option>
                <option value="MAS">MAS</option>
                <option value="JPN">JPN</option>
                <option value="KOR">KOR</option>
                <option value="INA">INA</option>
                <option value="TPE">TPE</option>
                <option value="IND">IND</option>
                <option value="DEN">DEN</option>
            </select>
            <button class="btn-score" onclick="changeScore(2, -1)">-</button>
            <button class="btn-score" onclick="changeScore(2, 1)">+</button>
            <button class="btn-action" onclick="setServing(2)">ให้เสิร์ฟ 🏸</button>
        </div>

        <hr style="border-color: #444;">
        <div class="control-row" style="justify-content: center;">
            <button class="btn-action" onclick="endSet()" style="background-color: #28a745;">จบเซ็ต (End Set)</button>
            <button class="btn-action btn-reset" onclick="resetMatch()">เริ่มแมตช์ใหม่</button>
        </div>
    </div>

    <!-- ส่วนที่ 3: JavaScript เหมือนเดิม -->
    <script>
        let currentScoreP1 = 0;
        let currentScoreP2 = 0;
        let pastSets = []; 

        updateUI();

        function updateUI() {
            document.getElementById('p1-name-disp').innerText = document.getElementById('input-p1-name').value;
            document.getElementById('p1-code-disp').innerText = document.getElementById('input-p1-code').value;
            document.getElementById('p2-name-disp').innerText = document.getElementById('input-p2-name').value;
            document.getElementById('p2-code-disp').innerText = document.getElementById('input-p2-code').value;

            let p1PastHtml = "";
            let p2PastHtml = "";
            pastSets.forEach(set => {
                p1PastHtml += `<div class="past-score">${set.p1}</div>`;
                p2PastHtml += `<div class="past-score">${set.p2}</div>`;
            });
            document.getElementById('p1-past-sets').innerHTML = p1PastHtml;
            document.getElementById('p2-past-sets').innerHTML = p2PastHtml;

            document.getElementById('p1-curr-disp').innerText = currentScoreP1;
            document.getElementById('p2-curr-disp').innerText = currentScoreP2;
        }

        function changeScore(player, amount) {
            if (player === 1) {
                if (currentScoreP1 + amount >= 0) {
                    currentScoreP1 += amount;
                    if(amount > 0) setServing(1);
                }
            } else {
                if (currentScoreP2 + amount >= 0) {
                    currentScoreP2 += amount;
                    if(amount > 0) setServing(2);
                }
            }
            updateUI();
        }

        function setServing(player) {
            document.getElementById('player1-row').classList.remove('is-serving');
            document.getElementById('player2-row').classList.remove('is-serving');
            if (player === 1) document.getElementById('player1-row').classList.add('is-serving');
            else if (player === 2) document.getElementById('player2-row').classList.add('is-serving');
        }

        function endSet() {
            if (currentScoreP1 === 0 && currentScoreP2 === 0) return;
            pastSets.push({ p1: currentScoreP1, p2: currentScoreP2 });
            currentScoreP1 = 0; currentScoreP2 = 0;
            document.getElementById('player1-row').classList.remove('is-serving');
            document.getElementById('player2-row').classList.remove('is-serving');
            updateUI();
        }

        function resetMatch() {
            if(confirm("แน่ใจหรือไม่ว่าต้องการเริ่มแมตช์ใหม่?")) {
                currentScoreP1 = 0; currentScoreP2 = 0; pastSets = [];
                document.getElementById('player1-row').classList.remove('is-serving');
                document.getElementById('player2-row').classList.remove('is-serving');
                updateUI();
            }
        }
    </script>
</body>
</html>
